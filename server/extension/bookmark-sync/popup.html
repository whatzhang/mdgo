<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            border-radius: 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }

        .btn-save {
            width: 100%;
            padding: 8px 16px;
            background-color: #2da44e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-save:hover {
            background-color: #2c974b;
        }

        .btn-save:disabled {
            background-color: #94d3a2;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .status.success {
            display: block;
            background-color: #dafbe1;
            color: #1a7f37;
        }

        .status.error {
            display: block;
            background-color: #ffebe9;
            color: #cf222e;
        }
    </style>
</head>

<body>
    <div class="form-group">
        <label for="apiBase">API 服务器地址</label>
        <input type="text" id="apiBase" placeholder="http://localhost:8090" />
    </div>
    <button class="btn-save" id="saveBtn">保存配置</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
</body>

</html>
