<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Knowledge Graph - Sigma.js</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            min-width: 1px;
            min-height: 1px;
            position: relative;
            cursor: grab;
        }

        #graph-container:active {
            cursor: grabbing;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e5e5e5;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 16px;
            color: #333333;
        }

        .loading-detail {
            font-size: 13px;
            color: #666666;
            margin-top: 8px;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        .controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 12px 16px;
            width: 200px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .control-group h3 {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-value {
            color: #3b82f6;
            font-weight: 600;
        }

        .btn {
            padding: 4px 6px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            color: #333333;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f5f5f5;
            border-color: #bfbfbf;
        }

        .btn-primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #2563eb;
            border-color: #2563eb;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 4px 30px 4px 6px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            color: #333333;
            font-size: 13px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #3b82f6;
        }

        .legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 12px 16px;
            height: auto;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .legend::-webkit-scrollbar {
            display: none;
        }

        .legend h3 {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #333333;
            padding: 3px 0;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }

        .legend-item:hover {
            opacity: 0.8;
        }

        .legend-item.inactive {
            opacity: 0.3;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .detail-panel {
            bottom: 60px;
            right: 10px;
            position: absolute;
            width: 320px;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
            z-index: 102;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .detail-panel.show {
            display: block;
        }

        .detail-panel h2 {
            font-size: 16px;
            color: #373636;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .detail-panel .url {
            font-size: 12px;
            color: #3b82f6;
            word-break: break-all;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
        }

        .detail-panel .url:hover {
            text-decoration: underline;
        }

        .detail-panel .summary {
            font-size: 13px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .detail-panel .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .detail-panel .tag {
            padding: 4px 10px;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            font-size: 12px;
            color: #333333;
        }

        .detail-panel .category {
            display: inline-block;
            padding: 4px 12px;
            background: #3b82f6;
            border-radius: 6px;
            font-size: 12px;
            color: white;
            margin-bottom: 16px;
        }

        .detail-panel .actions {
            display: flex;
            gap: 8px;
        }

        .detail-panel .btn {
            flex: 1;
            justify-content: center;
        }

        .tooltip {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #333333;
            pointer-events: none;
            z-index: 200;
            display: none;
            max-width: 250px;
            word-break: break-all;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .performance-stats {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: #999999;
            font-family: monospace;
        }

        .physics-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 101;
            width: 200px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 16px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .physics-controls h3 {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .slider-group {
            margin-bottom: 14px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666666;
            margin-bottom: 6px;
        }

        .slider-group .value {
            color: #3b82f6;
            font-weight: 600;
            font-family: monospace;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #f0f0f0;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .slider-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .physics-controls .btn {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }

        .physics-status {
            font-size: 11px;
            color: #999999;
            text-align: center;
            margin-top: 8px;
            padding: 6px;
            background: #f5f5f5;
            border-radius: 6px;
            font-family: monospace;
        }

        .physics-status.running {
            color: #f59e0b;
        }

        .physics-status.stable {
            color: #22c55e;
        }

        .search-box #clear-node-search {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border: none;
            background: var(--color-text-tertiary);
            color: var(--color-bg);
            border-radius: 50%;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            transition: background-color var(--transition-normal);
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="load-file-btn" onclick="handleLoadFile('file')">📂 选择文件</button>
            <button class="btn btn-primary" id="load-url-btn" onclick="handleLoadFile('url')">🔗 url 打开</button>
        </div>
        <div class="loading-detail" id="loading-detail">初始化中</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <h3>图谱统计</h3>
            <div class="stat-row"><span>节点总数</span><span class="stat-value" id="stat-nodes">0</span></div>
            <div class="stat-row"><span>边总数</span><span class="stat-value" id="stat-edges">0</span></div>
            <div class="stat-row"><span>书签数</span><span class="stat-value" id="stat-bookmarks">0</span></div>
            <div class="stat-row"><span>标签数</span><span class="stat-value" id="stat-tags">0</span></div>
        </div>
        <div class="control-group">
            <h3>操作</h3>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="resetCamera()">重置视图</button>
                <button class="btn" onclick="toggleLabels()">标签</button>
                <button class="btn" onclick="toggleEdges()">边线</button>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索节点..." oninput="filterNode(this.value)"
                    onkeydown="handleSearchNodeKeydown(event)" onkeypress="if(event.key==='Enter')searchNode()">
                <button id="clear-node-search" onclick="clearSearch()"
                    style="display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; font-size: 12px; padding: 0;">✕</button>
            </div>
        </div>
    </div>

    <div class="legend" id="legend">
        <h3>分类图例</h3>
        <div class="legend-item" id="tag-filter-btn" onclick="toggleTagFilter()">
            <div class="legend-dot" id="tag-filter-dot" style="background:#b8b8b8"></div>
            <span id="tag-filter-text">反选 Tag</span>
        </div>
        <div id="legend-items"></div>
    </div>

    <div id="graph-container"></div>

    <div class="detail-panel" id="detail-panel">
        <h2 id="detail-title" style="cursor:move;">详细信息</h2>
        <a href="" target="_blank" class="url" id="detail-url"></a>
        <div class="summary" id="detail-summary"></div>
        <div class="tags" id="detail-tags"></div>
        <span class="category" id="detail-category"></span>
        <div class="actions">
            <button class="btn btn-primary" onclick="closeDetail()">关闭</button>
        </div>
    </div>

    <div class="physics-controls" id="physics-controls">
        <h3>物理参数控制 <span style="font-size:11px;color:#64748b;">⚡</span></h3>

        <div class="slider-group">
            <label>节点大小 <span class="value" id="val-nodeSize">1</span></label>
            <input type="range" id="nodeSize" min="0.5" max="5" step="0.1" value="1" oninput="updatePhysics()">
        </div>

        <div class="slider-group">
            <label>连线长度 <span class="value" id="val-edgeLength">150</span></label>
            <input type="range" id="edgeLength" min="30" max="300" step="10" value="150" oninput="updatePhysics()">
        </div>

        <div class="slider-group">
            <label>相连节点吸引力 <span class="value" id="val-attraction">0.03</span></label>
            <input type="range" id="attraction" min="0.0001" max="0.3" step="0.0001" value="0.03"
                oninput="updatePhysics()">
        </div>

        <div class="slider-group">
            <label>节点间排斥力 <span class="value" id="val-repulsion">0.6</span></label>
            <input type="range" id="repulsion" min="0.5" max="3" step="0.05" value="0.6" oninput="updatePhysics()">
        </div>

        <div class="slider-group">
            <label>图谱向心力 <span class="value" id="val-gravity">0.05</span></label>
            <input type="range" id="gravity" min="0" max="0.3" step="0.0001" value="0.05" oninput="updatePhysics()">
        </div>

        <button class="btn" id="toggle-physics-btn" onclick="togglePhysics()" style="margin-top:6px;">⏸️ 暂停布局</button>

        <div class="physics-status" id="physics-status">就绪</div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <div class="performance-stats" id="perf-stats">FPS: -- | Nodes: -- | Edges: --</div>

    <script type="module">
        import Graph from 'https://cdn.jsdelivr.net/npm/graphology@0.25.4/+esm';
        import Sigma from 'https://cdn.jsdelivr.net/npm/sigma@3.0.0-beta.24/+esm';
        import * as d3 from 'https://cdn.jsdelivr.net/npm/d3-force@3/+esm';

        const API_BASE = '';
        const container = document.getElementById('graph-container');
        const loading = document.getElementById('loading');
        const loadingDetail = document.getElementById('loading-detail');
        const progressFill = document.getElementById('progress-fill');
        const perfStats = document.getElementById('perf-stats');

        let renderer = null;
        let graph = null;
        let showLabels = true;
        let showEdges = true;
        let highlightedNode = null;
        let simulation = null;
        let isPhysicsRunning = false;
        let activeGroups = null;
        let perfRafId = null;

        const physicsParams = {
            nodeSize: 1, // 节点大小
            edgeLength: 150, // 连线长度
            attraction: 0.03, // 连相节点吸引力
            repulsion: 0.6, // 节点间排斥力
            gravity: 0.05 // 图谱向心力
        };

        const DEFAULT_GROUP_COLORS = [
            '#11b5aa', '#667eea', '#f093fb', '#4facfe', '#43e97b',
            '#fa709a', '#f6ad55', '#fc8181', '#f6e05e', '#68d391',
            '#63b3ed', '#b794f4', '#f687b3', '#4fd1c5', '#a0aec0'
        ];
        let groupColors = {};
        let currentGroups = [];

        function getGroupColor(group) {
            if (!groupColors[group]) {
                const usedColors = Object.values(groupColors);
                for (let i = 0; i < DEFAULT_GROUP_COLORS.length; i++) {
                    if (!usedColors.includes(DEFAULT_GROUP_COLORS[i])) {
                        groupColors[group] = DEFAULT_GROUP_COLORS[i];
                        break;
                    }
                }
                if (!groupColors[group]) {
                    groupColors[group] = DEFAULT_GROUP_COLORS[Object.keys(groupColors).length % DEFAULT_GROUP_COLORS.length];
                }
            }
            return groupColors[group];
        }

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            if (text) loadingDetail.textContent = text;
        }
        window.handleLoadFile = async function (type = 'file') {
            const data = await loadGraphData(type);
            if (!data) return;
            const { nodeCount, edgeCount } = buildGraph(data);
            buildLegend(currentGroups);
            updateStats(nodeCount, edgeCount, data);
            if (!renderer) {
                initRenderer();
                startContinuousLayout();
                startPerfMonitor();
                setTimeout(() => {
                    window.togglePhysics();
                }, 30000);
            }
            setTimeout(() => loading.classList.add('hidden'), 500);
        }

        async function loadGraphData(type = 'file') {
            updateProgress(2, '准备加载数据...');
            let data;
            if (type === 'file') {
                try {
                    const [fileHandle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'JSON Files',
                            accept: { 'application/json': ['.json'] }
                        }]
                    });
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    data = JSON.parse(text);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('读取文件失败:', err);
                        updateProgress(100, '读取文件失败');
                    }
                    return null;
                }
            } else {
                const res = await fetch(`${API_BASE}/api/bm/graph/data`);
                data = await parseResponse(res);
            }

            updateProgress(30, `获取到 ${data.nodes?.length || 0} 个节点, ${data.edges?.length || 0} 条边`);
            return data;
        }

        async function parseResponse(res) {
            const text = await res.text();
            try {
                const parsed = JSON.parse(text);
                if (parsed.code === 200) return parsed.data;
                throw new Error(parsed.message || 'Unknown error');
            } catch (e) {
                throw e;
            }
        }

        function buildGraph(data) {
            updateProgress(35, '构建图数据结构...');
            graph = new Graph();
            groupColors = {};
            currentGroups = [];

            const nodeCount = data.nodes.length;
            const edgeCount = data.edges.length;

            data.nodes.forEach((node, i) => {
                if (i % 500 === 0) {
                    updateProgress(35 + Math.floor((i / nodeCount) * 25), `添加节点 ${i}/${nodeCount}`);
                }
                const group = node.group || '其他';
                if (!currentGroups.includes(group)) {
                    currentGroups.push(group);
                }
                graph.addNode(node.id, {
                    label: node.title || node.id,
                    x: Math.random() * 3000 - 1000,
                    y: Math.random() * 3000 - 1000,
                    size: 3,
                    color: getGroupColor(group),
                    type: 'circle',
                    nodeType: node.type,
                    group: group,
                    url: node.url || '',
                    summary: node.summary || '',
                    originalData: node
                });
            });

            let validEdges = 0;
            data.edges.forEach((edge, i) => {
                if (i % 1000 === 0) {
                    updateProgress(60 + Math.floor((i / edgeCount) * 15), `添加边 ${i}/${edgeCount}`);
                }
                if (graph.hasNode(edge.source) && graph.hasNode(edge.target)) {
                    graph.addEdge(edge.source, edge.target, {
                        size: 0.5,
                        color: '#94a3b8',
                        label: edge.title,
                        score: edge.score
                    });
                    validEdges++;
                }
            });

            updateProgress(75, `有效边: ${validEdges}/${edgeCount}`);

            const baseSize = 2;
            const maxSize = 25;
            graph.forEachNode((node) => {
                const degree = graph.degree(node);
                const nodeType = graph.getNodeAttribute(node, 'nodeType');
                const size = nodeType === 'tag' ? baseSize * 1.5 : baseSize;
                const scaledSize = Math.min(size + degree * 0.5, maxSize);
                graph.setNodeAttribute(node, 'size', scaledSize);
            });

            return { nodeCount, edgeCount: validEdges };
        }

        function createD3Forces(nodes, edges) {
            const nodeSizeMap = {};
            graph.forEachNode(node => {
                nodeSizeMap[node] = graph.getNodeAttribute(node, 'size');
            });

            return {
                forceCollide: d3.forceCollide()
                    .radius(d => {
                        const size = nodeSizeMap[d.id] || 3;
                        return size * 3 + 20;
                    })
                    .strength(1.2)
                    .iterations(5),
                forceLink: d3.forceLink(edges)
                    .id(d => d.id)
                    .distance(physicsParams.edgeLength)
                    .strength(physicsParams.attraction),
                forceManyBody: d3.forceManyBody()
                    .strength(-physicsParams.repulsion)
                    .distanceMax(4000),
                forceCenter: d3.forceCenter(0, 0).strength(physicsParams.gravity)
            };
        }

        function startContinuousLayout() {
            if (simulation) simulation.stop();

            const nodes = graph.nodes().map(id => ({ id }));
            const edges = graph.edges().map(e => {
                const [source, target] = graph.extremities(e);
                return { source, target };
            });

            const forces = createD3Forces(nodes, edges);
            simulation = d3.forceSimulation(nodes)
                .force('link', forces.forceLink)
                .force('charge', forces.forceManyBody)
                .force('center', forces.forceCenter)
                .force('collide', forces.forceCollide)
                .alphaDecay(0.02)
                .velocityDecay(0.4)
                .on('tick', () => {
                    nodes.forEach(node => {
                        graph.setNodeAttribute(node.id, 'x', node.x);
                        graph.setNodeAttribute(node.id, 'y', node.y);
                    });
                    if (renderer) renderer.refresh();
                });

            isPhysicsRunning = true;
            updatePhysicsStatus('running', '布局运行中');
            updateToggleButton();
        }

        function stopContinuousLayout() {
            if (simulation) simulation.stop();
            isPhysicsRunning = false;
            updatePhysicsStatus('stable', '布局已暂停');
            updateToggleButton();
        }

        function destroyCommon() {
            stopContinuousLayout();
            if (renderer) {
                renderer.kill();
                renderer = null;
            }
            if (graph) {
                graph.clear();
                graph = null;
            }
            if (perfRafId) {
                cancelAnimationFrame(perfRafId);
                perfRafId = null;
            }
            simulation = null;
        }

        window.destroyCommon = destroyCommon;

        function updateToggleButton() {
            const btn = document.getElementById('toggle-physics-btn');
            if (isPhysicsRunning) {
                btn.innerHTML = '⏸️ 暂停布局';
                btn.onclick = togglePhysics;
            } else {
                btn.innerHTML = '▶️ 开始布局';
                btn.onclick = togglePhysics;
            }
        }

        async function computeLayout(customSettings = null) {
            updateProgress(80, '计算力导向布局...');

            if (simulation) simulation.stop();

            const nodes = graph.nodes().map(id => ({ id }));
            const edges = graph.edges().map(e => {
                const [source, target] = graph.extremities(e);
                return { source, target };
            });

            const forces = createD3Forces(nodes, edges);
            simulation = d3.forceSimulation(nodes)
                .force('link', forces.forceLink)
                .force('charge', forces.forceManyBody)
                .force('center', forces.forceCenter)
                .force('collide', forces.forceCollide)
                .alphaDecay(0.02)
                .velocityDecay(0.4);

            updatePhysicsStatus('running', '布局运行中');
            isPhysicsRunning = true;
            updateToggleButton();

            await new Promise((resolve) => {
                setTimeout(resolve, 10000);
            });

            nodes.forEach(node => {
                graph.setNodeAttribute(node.id, 'x', node.x);
                graph.setNodeAttribute(node.id, 'y', node.y);
            });

            updateProgress(95, '布局初始化完成');
        }

        function initRenderer() {
            updateProgress(98, '初始化 WebGL 渲染器...');

            renderer = new Sigma(graph, container, {
                allowInvalidContainer: true,
                renderLabels: showLabels,
                labelSize: 11,
                labelWeight: 'normal',
                labelColor: { color: '#2b3748' },
                labelDensity: 1,
                labelGridCellSize: 60,
                labelRenderedSizeThreshold: 6,

                defaultNodeColor: '#999999',
                defaultNodeSize: 3,

                defaultEdgeColor: '#94a3b8',
                defaultEdgeSize: 0.4,

                minCameraRatio: 0.3,
                maxCameraRatio: 3,

                hideEdgesOnMove: false,
                hideLabelsOnMove: false,

                renderLabelHoverBalloon: true,

                nodeReducer: (node, data) => {
                    const res = { ...data };
                    if (activeGroups && !activeGroups.has(res.group)) {
                        res.hidden = true;
                        return res;
                    }
                    if (highlightedNode) {
                        const isNeighbor = graph.areNeighbors(node, highlightedNode);
                        if (node !== highlightedNode && !isNeighbor) {
                            res.color = '#e5e5e5';
                            res.hidden = true;
                        }
                    }
                    return res;
                },

                edgeReducer: (edge, data) => {
                    const res = { ...data };
                    if (!showEdges) {
                        res.hidden = true;
                        return res;
                    }
                    if (activeGroups) {
                        const ext = graph.extremities(edge);
                        const sourceAttrs = graph.getNodeAttributes(ext[0]);
                        const targetAttrs = graph.getNodeAttributes(ext[1]);
                        if (!activeGroups.has(sourceAttrs.group) || !activeGroups.has(targetAttrs.group)) {
                            res.hidden = true;
                            return res;
                        }
                    }
                    if (highlightedNode) {
                        const ext = graph.extremities(edge);
                        if (!ext.includes(highlightedNode)) {
                            res.hidden = true;
                        }
                    }
                    return res;
                }
            });

            renderer.on('clickNode', ({ node, event }) => {
                const attrs = graph.getNodeAttributes(node);
                if (attrs.nodeType === 'bookmark') {
                    showDetail(attrs, event);
                }
                highlightedNode = node;
                renderer.refresh();
            });

            renderer.on('clickStage', () => {
                const panel = document.getElementById('detail-panel');
                if (!panel.classList.contains('show')) {
                    highlightedNode = null;
                    document.getElementById('search-input').value = '';
                } else {
                    closeDetail();
                }
            });

            renderer.on('enterNode', ({ node }) => {
            });

            renderer.on('leaveNode', () => {
            });

            updateProgress(100, '渲染完成');
            setTimeout(() => loading.classList.add('hidden'), 500);
        }

        function showDetail(attrs, event) {
            const panel = document.getElementById('detail-panel');
            document.getElementById('detail-title').textContent = attrs.label;
            const urlEl = document.getElementById('detail-url');
            urlEl.href = attrs.url;
            urlEl.textContent = attrs.url;
            document.getElementById('detail-summary').textContent = attrs.summary || '暂无摘要';
            document.getElementById('detail-category').textContent = attrs.group || '未分类';
            document.getElementById('detail-category').style.background = attrs.color;

            const tagsContainer = document.getElementById('detail-tags');
            tagsContainer.innerHTML = '';
            if (attrs.originalData && attrs.originalData.tags) {
                attrs.originalData.tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = tag;
                    tagsContainer.appendChild(span);
                });
            }
            panel.style.display = 'block';
            panel.classList.add('show');

            let isDragging = false;
            let dragOffsetX = 0;
            let dragOffsetY = 0;

            const header = document.getElementById('detail-title');

            header.onmousedown = function (e) {
                if (e.target.tagName === 'A') return;
                e.preventDefault();
                isDragging = true;
                dragOffsetX = e.clientX - panel.offsetLeft;
                dragOffsetY = e.clientY - panel.offsetTop;
                panel.style.cursor = 'grabbing';
            };

            document.onmousemove = function (e) {
                if (!isDragging) return;
                e.preventDefault();
                panel.style.left = (e.clientX - dragOffsetX) + 'px';
                panel.style.top = (e.clientY - dragOffsetY) + 'px';
            };

            document.onmouseup = function () {
                if (isDragging) {
                    isDragging = false;
                    panel.style.cursor = 'move';
                }
            };
        }

        window.closeDetail = function () {
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('show');
            panel.style.display = 'none';
        };

        function showTooltip(text) {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            document.addEventListener('mousemove', moveTooltip);
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'none';
            document.removeEventListener('mousemove', moveTooltip);
        }

        function moveTooltip(e) {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        }

        window.resetCamera = function () {
            if (renderer) {
                renderer.getCamera().animatedReset({ duration: 600 });
                highlightedNode = null;
                closeDetail();
                document.getElementById('search-input').value = '';

                activeGroups = null;
                document.querySelectorAll('.legend-item').forEach(el => {
                    el.classList.remove('inactive');
                });

                const dot = document.getElementById('tag-filter-dot');
                const text = document.getElementById('tag-filter-text');
                if (dot) dot.style.background = '#b8b8b8';
                if (text) text.textContent = '反选 Tag';

                renderer.refresh();
            }
        };

        window.toggleLabels = function () {
            showLabels = !showLabels;
            if (renderer) {
                renderer.setSetting('renderLabels', showLabels);
                renderer.refresh();
            }
        };

        window.toggleEdges = function () {
            showEdges = !showEdges;
            if (renderer) {
                renderer.refresh();
            }
        };

        window.clearSearch = function () {
            document.getElementById('clear-node-search').style.display = 'none';
            document.getElementById('search-input').value = '';
        };

        window.filterNode = function (query) {
            if (!graph || !renderer) return;
            query = query.trim().toLowerCase();
            if (!query) return;
            document.getElementById('clear-node-search').style.display = 'flex';
        };

        window.handleSearchNodeKeydown = function (event) {
            if ((event.key === 'Delete' || event.key === 'Backspace') && event.target.value === '') {
                event.preventDefault();
                document.getElementById('clear-node-search').style.display = 'none';
            }
        };

        window.searchNode = function () {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if (!query || !graph || !renderer) return;

            document.getElementById('clear-node-search').style.display = query ? 'flex' : 'none';
            let found = null;
            let matchCount = 0;
            const matches = [];

            graph.forEachNode((node, attrs) => {
                const label = (attrs.label || '').toLowerCase();
                if (label.includes(query)) {
                    matchCount++;
                    matches.push({ node, label: attrs.label });
                    if (!found) {
                        found = node;
                    }
                }
            });

            if (found) {
                highlightedNode = found;
                renderer.refresh();
            } else {
                alert(`未找到匹配的节点\n搜索词: "${query}"\n匹配数量: ${matchCount}`);
            }
        };

        window.updatePhysics = function () {
            physicsParams.nodeSize = parseFloat(document.getElementById('nodeSize').value);
            physicsParams.edgeLength = parseFloat(document.getElementById('edgeLength').value);
            physicsParams.attraction = parseFloat(document.getElementById('attraction').value);
            physicsParams.repulsion = parseFloat(document.getElementById('repulsion').value);
            physicsParams.gravity = parseFloat(document.getElementById('gravity').value);

            document.getElementById('val-nodeSize').textContent = physicsParams.nodeSize;
            document.getElementById('val-edgeLength').textContent = physicsParams.edgeLength;
            document.getElementById('val-attraction').textContent = physicsParams.attraction.toFixed(3);
            document.getElementById('val-repulsion').textContent = physicsParams.repulsion;
            document.getElementById('val-gravity').textContent = physicsParams.gravity.toFixed(2);

            applyPhysicsRealtime();
        };

        function applyPhysicsRealtime() {
            if (!graph) return;

            const baseSize = 2;
            const maxSize = 25;
            graph.forEachNode((node) => {
                const degree = graph.degree(node);
                const nodeType = graph.getNodeAttribute(node, 'nodeType');
                const size = nodeType === 'tag' ? baseSize * 1.5 : baseSize;
                const scaledSize = Math.min(size + degree * 0.5, maxSize) * physicsParams.nodeSize;
                graph.setNodeAttribute(node, 'size', scaledSize);
            });

            if (simulation) {
                simulation.stop();
                const nodes = graph.nodes().map(id => ({ id }));
                const edges = graph.edges().map(e => {
                    const [source, target] = graph.extremities(e);
                    return { source, target };
                });
                const forces = createD3Forces(nodes, edges);
                simulation = d3.forceSimulation(nodes)
                    .force('link', forces.forceLink)
                    .force('charge', forces.forceManyBody)
                    .force('center', forces.forceCenter)
                    .force('collide', forces.forceCollide)
                    .alphaDecay(0.02)
                    .velocityDecay(0.4)
                    .on('tick', () => {
                        nodes.forEach(node => {
                            graph.setNodeAttribute(node.id, 'x', node.x);
                            graph.setNodeAttribute(node.id, 'y', node.y);
                        });
                        if (renderer) renderer.refresh();
                    });
                isPhysicsRunning = true;
                updatePhysicsStatus('running', '布局运行中');
                updateToggleButton();
            }
        }

        window.togglePhysics = function () {
            if (isPhysicsRunning) {
                stopContinuousLayout();
            } else {
                startContinuousLayout();
            }
        };

        function updatePhysicsStatus(status, text) {
            const el = document.getElementById('physics-status');
            el.textContent = text;
            el.className = 'physics-status ' + status;
        }

        function updateStats(nodeCount, edgeCount, data) {
            document.getElementById('stat-nodes').textContent = nodeCount;
            document.getElementById('stat-edges').textContent = edgeCount;
            document.getElementById('stat-bookmarks').textContent = data.nodes.filter(n => n.type === 'bookmark').length;
            document.getElementById('stat-tags').textContent = data.nodes.filter(n => n.type === 'tag').length;
        }

        function buildLegend(groups) {
            const container = document.getElementById('legend-items');
            container.innerHTML = '';
            const sortedGroups = [...(groups || currentGroups)].sort((a, b) => {
                if (a === 'tag') return -1;
                if (b === 'tag') return 1;
                //转换为字符串进行比较
                return a.toString().localeCompare(b.toString());
            });
            sortedGroups.forEach(group => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.dataset.group = group;
                item.innerHTML = `<div class="legend-dot" style="background:${getGroupColor(group)}"></div><span>${group}</span>`;
                item.addEventListener('click', () => toggleGroupFilter(group, item));
                container.appendChild(item);
            });
        }

        function toggleGroupFilter(group, itemElement) {
            if (!activeGroups) {
                activeGroups = new Set([group]);
                document.querySelectorAll('.legend-item').forEach(el => {
                    if (el.dataset.group !== group) el.classList.add('inactive');
                });
            } else if (activeGroups.has(group) && activeGroups.size === 1) {
                activeGroups = null;
                document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('inactive'));
            } else {
                activeGroups = new Set([group]);
                document.querySelectorAll('.legend-item').forEach(el => {
                    if (el.dataset.group !== group) el.classList.add('inactive');
                    else el.classList.remove('inactive');
                });
            }
            if (renderer) renderer.refresh();
        }

        window.toggleTagFilter = function () {
            const btn = document.getElementById('tag-filter-btn');
            const dot = document.getElementById('tag-filter-dot');
            const text = document.getElementById('tag-filter-text');
            if (!activeGroups) {
                activeGroups = new Set();
                currentGroups.forEach(group => {
                    if (group !== 'tag') activeGroups.add(group);
                });
                document.querySelectorAll('.legend-item[data-group]').forEach(el => {
                    if (el.dataset.group === 'tag') el.classList.add('inactive');
                    else el.classList.remove('inactive');
                });
                dot.style.background = '#e07b54';
                text.textContent = '显示全部';
            } else {
                activeGroups = null;
                document.querySelectorAll('.legend-item[data-group]').forEach(el => el.classList.remove('inactive'));
                dot.style.background = '#b8b8b8';
                text.textContent = '反选 Tag';
            }
            if (renderer) renderer.refresh();
        };

        function startPerfMonitor() {
            let lastTime = performance.now();
            let frames = 0;

            function tick() {
                const now = performance.now();
                frames++;
                if (now - lastTime >= 1000) {
                    const fps = Math.round((frames * 1000) / (now - lastTime));
                    const nodeCount = graph ? graph.order : 0;
                    const edgeCount = graph ? graph.size : 0;
                    perfStats.textContent = `FPS: ${fps} | Nodes: ${nodeCount} | Edges: ${edgeCount}`;
                    frames = 0;
                    lastTime = now;
                }
                perfRafId = requestAnimationFrame(tick);
            }
            perfRafId = requestAnimationFrame(tick);
        }

        async function init() {
            try {
                buildLegend();
                loadingDetail.textContent = '请点击「选择文件」或「url 打开」按钮加载图谱数据';
                progressFill.style.width = '0%';
            } catch (e) {
                console.error('初始化失败:', e);
                loadingDetail.textContent = '加载失败: ' + e.message;
                progressFill.style.background = '#ef4444';
            }
        }

        init();
    </script>
</body>
